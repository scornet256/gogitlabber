---
version: 2

# release information
release:
  name_template: "GoGitlabber - {{ .Version }}"

# before
before:
  hooks:
    - "go mod tidy"
    - "go generate ./..."

# build
builds:
  - id: "gogitlabber"
    binary: "gogitlabber"
    main: "./cmd/gogitlabber"
    env:
      - "CGO_ENABLED=0"
    goarch:
      - "amd64"
      - "arm64"
    goos:
      - "darwin"
      - "freebsd"
      - "linux"
      - "windows"

# changelog
changelog:
  use: "git"
  sort: "desc"
  groups:
    - title: "🚀 Features"
      regexp: "^feat"
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
    - title: "🛠️ Maintenance"
      regexp: "^(chore|refactor)"
    - title: "🦾 Automation"
      regexp: "^ci"
    - title: "📖 Documentation"
      regexp: "^docs"

# gitea/forgejo
gitea_urls:
  api: "https://git.simoncor.net/api/v1"
  download: "https://git.simoncor.net"
  skip_tls_verify: false
